title: Recipe Schema
description: "\u56FE\u8868\u914D\u65B9\u7684 YAML Schema \u5B9A\u4E49 | Chart recipe\
  \ YAML schema definition"
type: object
required:
- id
- type
- data
- aesthetics
- output
properties:
  id:
    type: string
    description: "\u914D\u65B9\u552F\u4E00\u6807\u8BC6"
  name:
    type: string
    description: "\u4EBA\u7C7B\u53EF\u8BFB\u540D\u79F0"
  type:
    type: string
    enum:
    - line-chart
    - bar-chart
    - scatter-plot
    - heatmap
    - boxplot
    - histogram
    description: "\u56FE\u8868\u7C7B\u578B"
  data:
    type: object
    description: "\u56FE\u8868\u6570\u636E\uFF08\u7C7B\u578B\u76F8\u5173\uFF09"
  aesthetics:
    type: object
    description: "\u7F8E\u5B66\u53C2\u6570"
    properties:
      title:
        type: string
      x_label:
        type: string
      y_label:
        type: string
      palette:
        type: array
        items:
          type: string
      font_size:
        type: integer
        minimum: 5
      figsize:
        type: array
        items:
          type: number
        minItems: 2
        maxItems: 2
      dpi:
        type: integer
        minimum: 72
      line_width:
        type: number
        minimum: 0.1
      cmap:
        type: string
        description: "\u70ED\u529B\u56FE\u8272\u9636\u540D\u79F0"
      bins:
        type: integer
        minimum: 1
        description: "\u76F4\u65B9\u56FE\u7684\u67F1\u6570"
  output:
    type: object
    required:
    - dir
    - filename
    properties:
      dir:
        type: string
        description: "\u8F93\u51FA\u76EE\u5F55"
      filename:
        type: string
        description: "\u8F93\u51FA\u6587\u4EF6\u540D"
      format:
        type: string
        enum:
        - png
        - svg
        - pdf
        - eps
        - html
        default: png
        description: "\u8F93\u51FA\u683C\u5F0F"
  notes:
    type: string
    description: "\u4EBA\u7C7B\u6CE8\u91CA"
