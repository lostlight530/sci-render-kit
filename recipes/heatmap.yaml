id: heatmap-demo
name: 热力图演示
type: heatmap

data:
  matrix:
    - [1.0, 0.8, 0.6, 0.4]
    - [0.8, 1.0, 0.7, 0.5]
    - [0.6, 0.7, 1.0, 0.9]
    - [0.4, 0.5, 0.9, 1.0]
  row_labels: ["A", "B", "C", "D"]
  col_labels: ["A", "B", "C", "D"]

aesthetics:
  title: "相关性矩阵"
  cmap: "RdBu_r"
  font_size: 10
  figsize: [5.0, 4.0]
  dpi: 300

output:
  dir: output
  filename: heatmap.png
  format: png

notes: >
  演示用配方：展示相关性矩阵热力图
  预期：带数值标注的方形热力图，RdBu_r 色阶
